server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Cache static assets
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # PWA service worker should not be cached
  location = /sw.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # SPA fallback — all routes resolve to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
