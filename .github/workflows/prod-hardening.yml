name: Production Hardening Gates

on:
  pull_request:
  workflow_dispatch:

jobs:
  edge-unit-tests:
    name: Edge unit tests (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run edge unit tests
        run: deno test --allow-env --allow-net supabase/functions/__tests__/

  frontend-gates:
    name: Frontend typecheck + build + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install (reproducible)
        run: npm ci || npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Dependency audit (blocks on critical; xlsx high CVE tracked separately)
        run: npm audit --audit-level=critical

  static-analysis:
    name: Edge security static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: npm install
      - name: Edge function audit (CORS / SSRF / credential reads)
        run: npm run audit:edge
      - name: No plain credential reads
        run: npm run check:credentials
      - name: Internal calls use header
        run: npm run check:internal-auth
